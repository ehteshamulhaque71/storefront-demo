<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Management - StoreFront</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">StoreFront</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">SignUp</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="products.html">Products</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Product Form -->
    <div class="container my-5">
        <div class="card p-4 mb-4">
            <h2 class="text-center mb-4">Add Product</h2>

            <form id="productForm" class="row g-3 needs-validation" novalidate>

                <div class="col-md-6">
                    <label for="productTitle" class="form-label">Product Title <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="productTitle" name="productTitle" placeholder="Laptop Computer" autocomplete="off" required>
                    <div class="text-danger" id="productTitleError"></div>
                </div>

                <div class="col-md-6">
                    <label for="category" class="form-label">Category <strong class="text-danger">*</strong></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Choose...</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Books">Books</option>
                    </select>
                    <div class="text-danger" id="categoryError"></div>
                </div>

                <div class="col-md-4">
                    <label for="unitMeasure" class="form-label">Unit of Measure <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="unitMeasure" name="unitMeasure" placeholder="1 piece" autocomplete="off" required>
                    <div class="text-danger" id="unitMeasureError"></div>
                </div>

                <div class="col-md-4">
                    <label for="price" class="form-label">Price <strong class="text-danger">*</strong></label>
                    <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" placeholder="99.99" autocomplete="off" required>
                    <div class="text-danger" id="priceError"></div>
                </div>

                <div class="col-md-4">
                    <label for="additionalInfo" class="form-label">Additional Info</label>
                    <input type="text" class="form-control" id="additionalInfo" name="additionalInfo" placeholder="Optional details" autocomplete="off">
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Add Product</button>
                    <button class="btn btn-secondary" type="reset">Clear Form</button>
                </div>
            </form>
        </div>

        <!-- jQuery Search Box -->
        <div class="card p-3 mb-4">
            <label for="searchBox" class="form-label"><strong>Search Products:</strong></label>
            <input type="text" class="form-control" id="searchBox" placeholder="Type to search by title or category...">
            <small class="text-muted mt-2">Search updates in real-time as you type</small>
        </div>

        <!-- Products Display -->
        <h3 class="mb-3">Product Catalog <span class="badge bg-secondary" id="productCount">0</span></h3>
        <div class="row" id="productContainer">
            <p class="text-muted text-center">No products added yet. Add your first product above!</p>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Update Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="updateForm" novalidate>
                        <input type="hidden" id="updateProductId">
                        
                        <div class="mb-3">
                            <label for="updateProductTitle" class="form-label">Product Title <strong class="text-danger">*</strong></label>
                            <input type="text" class="form-control" id="updateProductTitle" required>
                            <div class="text-danger" id="updateProductTitleError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="updateCategory" class="form-label">Category <strong class="text-danger">*</strong></label>
                            <select class="form-select" id="updateCategory" required>
                                <option value="">Choose...</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Furniture">Furniture</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Books">Books</option>
                            </select>
                            <div class="text-danger" id="updateCategoryError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="updateUnitMeasure" class="form-label">Unit of Measure <strong class="text-danger">*</strong></label>
                            <input type="text" class="form-control" id="updateUnitMeasure" required>
                            <div class="text-danger" id="updateUnitMeasureError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="updatePrice" class="form-label">Price <strong class="text-danger">*</strong></label>
                            <input type="number" class="form-control" id="updatePrice" step="0.01" min="0" required>
                            <div class="text-danger" id="updatePriceError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="updateAdditionalInfo" class="form-label">Additional Info</label>
                            <input type="text" class="form-control" id="updateAdditionalInfo">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveUpdateBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 StoreFront | IST 256 Group Project Demo</p>
    </footer>

    <!-- Bootstrap JS (needed for modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Custom JS -->
    <script src="js/products.js"></script>

</body>

</html>
